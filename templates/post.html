<article>
<header class="article-header">
    <span class="category-badge">$category$</span>
    <h1 class="article-title">$title$</h1>
    $if(description)$<p class="article-description">$description$</p>$endif$
    <div class="article-meta">
        <span class="meta-item">公開: $date$</span>
        <span class="meta-item">更新: $mtime$</span>
    </div>
    <div class="tag-chips">$tags$</div>
</header>

$body$
</article>
