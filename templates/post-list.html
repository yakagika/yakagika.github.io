<ul>
    $for(posts)$
    <li>
        <p>
            $if(isOpen)$
            “<a href="$url$">$title$</a>”
            $else$
            “<span class="draft-title">$title$</span>” <span class="badge badge-draft">準備中</span>
            $endif$
            ‒ <span class="soft">$date$</span><br />
            $description$
        </p>
    </li>
    $endfor$
</ul>
