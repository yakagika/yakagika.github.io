name:                fp-examples
version:             0.1.0.0
synopsis:            Verification harness for lectures/fp/* code samples
license:             MIT
author:              "Kaya Akagi"

description: |
  lectures/fp/fp*.md に掲載されている Haskell コード例の機械的検証用テストスイート.
  詳細は plans/in-progress/fp-examples-verification.md を参照.

dependencies:
  - base >= 4 && < 5

tests:
  fp-examples-spec:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
      - -Wall
      - -Wno-unused-imports
      - -Wno-unused-matches
      - -Wno-name-shadowing
    build-tool-depends:
      - hspec-discover:hspec-discover
    dependencies:
      - hspec
