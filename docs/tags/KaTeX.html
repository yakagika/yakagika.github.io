    <!-- JavaScript TOC generator (only runs on lecture pages) -->
    <script>

      var path = window.location.pathname;
      var navLinks = document.querySelectorAll('.drawer-menu > a');
      navLinks.forEach(function(link) {
        var href = link.getAttribute('href');
        if (href === path || (href === '/' && path === '/index.html')) {
          link.classList.add('active');
        }
      });
    });
    </script>
    <!-- 外部リンクを別タブで開く -->
    <script>
    document.addEventListener("DOMContentLoaded", function() {
      document.querySelectorAll('a[href]').forEach(function(link) {
        var href = link.getAttribute('href');
        if (!href) return;
        if (href.charAt(0) === '#') return;
        if (/^(mailto:|tel:|javascript:)/i.test(href)) return;
        try {
          var url = new URL(href, window.location.href);
          if (url.host && url.host !== window.location.host) {
            link.setAttribute('target', '_blank');
            link.setAttribute('rel', 'noopener noreferrer');
          }
        } catch (e) { /* invalid URL — leave as-is */ }
      });
    });
    </script>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
      var tocContainer = document.getElementById('lecture-toc');
      if (!tocContainer) return;

      var mode = tocContainer.getAttribute('data-mode') || 'single';

      // メインコンテンツから h2, h3, h4 を抽出して階層ULを返す
      function buildHeadingsList(content) {
        var headings = content.querySelectorAll('h2, h3, h4');
        if (headings.length === 0) return null;

        var rootList = document.createElement('ul');
        rootList.classList.add('toc-root');
        var currentULs = [rootList, null, null];

        headings.forEach(function(heading) {
          if (heading.closest('li')) return;

          var level;
          switch (heading.tagName.toLowerCase()) {
            case 'h2': level = 0; break;
            case 'h3': level = 1; break;
            case 'h4': level = 2; break;
            default: return;
          }

          var parentUL = null;
          for (var i = level; i >= 0; i--) {
            if (currentULs[i]) { parentUL = currentULs[i]; break; }
          }
          if (!parentUL) parentUL = rootList;

          var li = document.createElement('li');
          li.classList.add('toc-item', 'toc-level-' + (level + 1));

          var row = document.createElement('div');
          row.classList.add('toc-row');

          var toggle = document.createElement('span');
          toggle.classList.add('toc-toggle');
          toggle.textContent = '▾';

          var anchor = document.createElement('a');
          anchor.href = '#' + heading.id;
          anchor.textContent = heading.textContent;

          row.appendChild(toggle);
          row.appendChild(anchor);
          li.appendChild(row);
          parentUL.appendChild(li);

          var childUL = document.createElement('ul');
          childUL.classList.add('toc-sublist');
          li.appendChild(childUL);
          currentULs[level + 1] = childUL;

          for (var j = level + 2; j < currentULs.length; j++) {
            currentULs[j] = null;
          }

          toggle.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            li.classList.toggle('collapsed');
          });
        });

        rootList.querySelectorAll('li.toc-item').forEach(function(li) {
          var sub = li.querySelector(':scope > ul.toc-sublist');
          if (!sub || sub.children.length === 0) {
            li.classList.add('no-children');
            if (sub) sub.remove();
          }
        });

        return rootList;
      }

      // シリーズ項目にトグルクリックのイベントを設定
      function attachSeriesToggleEvents() {
        tocContainer.querySelectorAll('.toc-series-item > .toc-row > .toc-toggle').forEach(function(toggle) {
          toggle.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            toggle.closest('.toc-series-item').classList.toggle('collapsed');
          });
        });
      }

      var content = document.querySelector('article') || document.getElementById('content') || document.body;

      if (mode === 'series') {
        // シリーズモード: 全章リストは既にサーバーで描画済み
        // 現在の章のみ見出しを展開
        var currentLi = tocContainer.querySelector('.toc-series-item.current');
        var allSeriesItems = tocContainer.querySelectorAll('.toc-series-item');

        if (currentLi) {
          var sublistContainer = currentLi.querySelector(':scope > ul.toc-sublist');
          var headingsList = buildHeadingsList(content);
          if (headingsList && sublistContainer) {
            // buildHeadingsList の中身を sublistContainer に移す
            while (headingsList.firstChild) {
              sublistContainer.appendChild(headingsList.firstChild);
            }
          }
        }

        // 現在の章以外は折りたたむ
        allSeriesItems.forEach(function(li) {
          if (li !== currentLi) {
            li.classList.add('collapsed');
          }
        });

        // 子要素のない章 (現在の章で見出しがない場合、および他の章) のトグルは非表示
        allSeriesItems.forEach(function(li) {
          var sub = li.querySelector(':scope > ul.toc-sublist');
          if (!sub || sub.children.length === 0) {
            li.classList.add('no-children');
          }
        });

        attachSeriesToggleEvents();
      } else {
        // 単一ページモード (post)
        var headingsList = buildHeadingsList(content);
        if (headingsList) {
          tocContainer.appendChild(headingsList);
        }
      }
    });
    </script>
     <script>
  document.addEventListener("DOMContentLoaded", function() {
    // すべての <pre><code> 要素を走査
    const codeBlocks = document.querySelectorAll('pre code');
    codeBlocks.forEach(function(codeBlock) {
      // 親<pre>要素を取得
      const pre = codeBlock.parentNode;

      // <pre> を相対配置にし、子要素を絶対配置できるようにする
      pre.style.position = 'relative';

      // コピーボタンを作成
      const copyButton = document.createElement('button');
      copyButton.textContent = 'Copy';
      // ボタンのデザインはCSSで指定するのが望ましいが、簡易的にスタイルを直接指定する例:
      copyButton.style.position = 'absolute';
      copyButton.style.top = '8px';
      copyButton.style.right = '8px';
      copyButton.style.backgroundColor = '#add8e6'; // 水色
      copyButton.style.color = '#fff';             // 白文字
      copyButton.style.border = 'none';
      copyButton.style.padding = '6px 10px';
      copyButton.style.borderRadius = '4px';
      copyButton.style.cursor = 'pointer';

      // クリックされたらクリップボードにコピー
      copyButton.addEventListener('click', function() {
        const codeText = codeBlock.innerText;
        navigator.clipboard.writeText(codeText).then(function() {
          copyButton.textContent = 'Copied!';
          setTimeout(function() {
            copyButton.textContent = 'Copy';
          }, 2000);
        }, function(err) {
          console.error('Failed to copy: ', err);
        });
      });

      // ボタンを <pre> の子要素として挿入
      pre.appendChild(copyButton);
    });
  });
  </script>
