<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif">
  <defs>
    <marker id="ah-blue"   markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1f6fb2"/></marker>
    <marker id="ah-green"  markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2e8b57"/></marker>
    <marker id="ah-orange" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#d97706"/></marker>
    <marker id="ah-red"    markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#c0392b"/></marker>
  </defs>

  <rect x="0" y="0" width="900" height="430" fill="#ffffff"/>

  <!-- highlight boxes behind the four parts -->
  <rect x="188" y="196" width="232" height="48" rx="8" fill="#1f6fb2" opacity="0.10"/>
  <rect x="492" y="196" width="36"  height="48" rx="8" fill="#2e8b57" opacity="0.12"/>
  <rect x="582" y="196" width="60"  height="48" rx="8" fill="#d97706" opacity="0.12"/>
  <rect x="712" y="196" width="36"  height="48" rx="8" fill="#c0392b" opacity="0.12"/>

  <!-- the type signature (monospace) -->
  <g font-family="Menlo,'DejaVu Sans Mono',monospace" font-size="34" fill="#222">
    <text x="30"  y="231">foldl ::</text>
    <text x="304" y="231" text-anchor="middle" fill="#1f6fb2">(a -&gt; b -&gt; a)</text>
    <text x="455" y="231" text-anchor="middle">-&gt;</text>
    <text x="510" y="231" text-anchor="middle" fill="#2e8b57">a</text>
    <text x="560" y="231" text-anchor="middle">-&gt;</text>
    <text x="612" y="231" text-anchor="middle" fill="#d97706">[b]</text>
    <text x="680" y="231" text-anchor="middle">-&gt;</text>
    <text x="730" y="231" text-anchor="middle" fill="#c0392b">a</text>
  </g>

  <!-- top labels: function & initial value -->
  <g font-size="22">
    <text x="304" y="120" text-anchor="middle" fill="#1f6fb2">畳む用の関数</text>
    <line x1="304" y1="132" x2="304" y2="190" stroke="#1f6fb2" stroke-width="2" marker-end="url(#ah-blue)"/>

    <text x="510" y="120" text-anchor="middle" fill="#2e8b57">初期値</text>
    <line x1="510" y1="132" x2="510" y2="190" stroke="#2e8b57" stroke-width="2" marker-end="url(#ah-green)"/>
  </g>

  <!-- bottom labels: list & result -->
  <g font-size="22">
    <text x="612" y="330" text-anchor="middle" fill="#d97706">これから畳まれるリスト</text>
    <line x1="612" y1="252" x2="612" y2="312" stroke="#d97706" stroke-width="2" marker-end="url(#ah-orange)"/>

    <text x="730" y="378" text-anchor="middle" fill="#c0392b">畳まれた結果</text>
    <line x1="730" y1="252" x2="730" y2="360" stroke="#c0392b" stroke-width="2" marker-end="url(#ah-red)"/>
  </g>
</svg>
