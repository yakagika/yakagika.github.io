<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif">
  <defs>
    <marker id="axis" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#888"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="360" fill="#ffffff"/>

  <!-- ============ OR (Lx=60) : separable ============ -->
  <text x="130" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">OR</text>
  <line x1="30"  y1="235" x2="245" y2="235" stroke="#888" stroke-width="1.5" marker-end="url(#axis)"/>
  <line x1="60"  y1="250" x2="60"  y2="70"  stroke="#888" stroke-width="1.5" marker-end="url(#axis)"/>
  <text x="255" y="240" font-size="15" fill="#555">x₁</text>
  <text x="50"  y="62"  font-size="15" fill="#555">x₂</text>
  <text x="46"  y="252" font-size="13" fill="#888">0</text>
  <text x="200" y="252" font-size="13" fill="#888">1</text>
  <text x="46"  y="100" font-size="13" fill="#888">1</text>
  <!-- separating line x1+x2=0.5 -->
  <line x1="39" y1="144" x2="151" y2="256" stroke="#2e8b57" stroke-width="2.5" stroke-dasharray="7,5"/>
  <!-- points: (0,0)=0 open ; others filled -->
  <circle cx="60"  cy="235" r="10" fill="#ffffff" stroke="#555" stroke-width="2"/>
  <circle cx="200" cy="235" r="10" fill="#c0392b" stroke="#7b241c" stroke-width="1.5"/>
  <circle cx="60"  cy="95"  r="10" fill="#c0392b" stroke="#7b241c" stroke-width="1.5"/>
  <circle cx="200" cy="95"  r="10" fill="#c0392b" stroke="#7b241c" stroke-width="1.5"/>
  <text x="130" y="305" text-anchor="middle" font-size="15" fill="#555">(0,0) だけ分離 → 可能</text>

  <!-- ============ AND (Lx=350) : separable ============ -->
  <text x="420" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">AND</text>
  <line x1="320" y1="235" x2="535" y2="235" stroke="#888" stroke-width="1.5" marker-end="url(#axis)"/>
  <line x1="350" y1="250" x2="350" y2="70"  stroke="#888" stroke-width="1.5" marker-end="url(#axis)"/>
  <text x="545" y="240" font-size="15" fill="#555">x₁</text>
  <text x="340" y="62"  font-size="15" fill="#555">x₂</text>
  <text x="336" y="252" font-size="13" fill="#888">0</text>
  <text x="490" y="252" font-size="13" fill="#888">1</text>
  <text x="336" y="100" font-size="13" fill="#888">1</text>
  <!-- separating line x1+x2=1.5 -->
  <line x1="399" y1="74" x2="511" y2="186" stroke="#2e8b57" stroke-width="2.5" stroke-dasharray="7,5"/>
  <!-- points: (1,1)=1 filled ; others open -->
  <circle cx="350" cy="235" r="10" fill="#ffffff" stroke="#555" stroke-width="2"/>
  <circle cx="490" cy="235" r="10" fill="#ffffff" stroke="#555" stroke-width="2"/>
  <circle cx="350" cy="95"  r="10" fill="#ffffff" stroke="#555" stroke-width="2"/>
  <circle cx="490" cy="95"  r="10" fill="#c0392b" stroke="#7b241c" stroke-width="1.5"/>
  <text x="420" y="305" text-anchor="middle" font-size="15" fill="#555">(1,1) だけ分離 → 可能</text>

  <!-- ============ XOR (Lx=640) : NOT separable ============ -->
  <text x="710" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">XOR</text>
  <line x1="610" y1="235" x2="825" y2="235" stroke="#888" stroke-width="1.5" marker-end="url(#axis)"/>
  <line x1="640" y1="250" x2="640" y2="70"  stroke="#888" stroke-width="1.5" marker-end="url(#axis)"/>
  <text x="835" y="240" font-size="15" fill="#555">x₁</text>
  <text x="630" y="62"  font-size="15" fill="#555">x₂</text>
  <text x="626" y="252" font-size="13" fill="#888">0</text>
  <text x="780" y="252" font-size="13" fill="#888">1</text>
  <text x="626" y="100" font-size="13" fill="#888">1</text>
  <!-- an attempted dividing line (any line fails): vertical x1=0.5 -->
  <line x1="710" y1="72" x2="710" y2="250" stroke="#aaaaaa" stroke-width="2.5" stroke-dasharray="6,5"/>
  <text x="710" y="172" text-anchor="middle" font-size="30" font-weight="bold" fill="#c0392b" stroke="#ffffff" stroke-width="4" paint-order="stroke">✗</text>
  <!-- points: (1,0),(0,1)=1 filled ; (0,0),(1,1)=0 open -->
  <circle cx="640" cy="235" r="10" fill="#ffffff" stroke="#555" stroke-width="2"/>
  <circle cx="780" cy="235" r="10" fill="#c0392b" stroke="#7b241c" stroke-width="1.5"/>
  <circle cx="640" cy="95"  r="10" fill="#c0392b" stroke="#7b241c" stroke-width="1.5"/>
  <circle cx="780" cy="95"  r="10" fill="#ffffff" stroke="#555" stroke-width="2"/>
  <text x="710" y="305" text-anchor="middle" font-size="15" fill="#555">対角に ● ○ → 分離不可能</text>

  <!-- ============ legend ============ -->
  <circle cx="300" cy="338" r="8" fill="#c0392b" stroke="#7b241c" stroke-width="1.5"/>
  <text x="314" y="343" font-size="14" fill="#444">出力 1</text>
  <circle cx="400" cy="338" r="8" fill="#ffffff" stroke="#555" stroke-width="2"/>
  <text x="414" y="343" font-size="14" fill="#444">出力 0</text>
  <line x1="490" y1="338" x2="528" y2="338" stroke="#2e8b57" stroke-width="2.5" stroke-dasharray="7,5"/>
  <text x="536" y="343" font-size="14" fill="#444">分離直線</text>
</svg>
