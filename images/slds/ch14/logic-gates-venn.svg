<svg xmlns="http://www.w3.org/2000/svg" width="560" height="510" viewBox="0 0 560 510" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif">
  <defs>
    <clipPath id="clipAND"><circle cx="115" cy="135" r="52"/></clipPath>
    <clipPath id="clipNAND"><circle cx="115" cy="395" r="52"/></clipPath>
  </defs>

  <rect x="0" y="0" width="560" height="510" fill="#ffffff"/>

  <!-- ===================== AND (top-left) ===================== -->
  <text x="140" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">AND</text>
  <rect x="40" y="60" width="200" height="150" rx="10" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <!-- shaded: intersection only -->
  <circle cx="165" cy="135" r="52" fill="#7fb3df" clip-path="url(#clipAND)"/>
  <!-- circle outlines -->
  <circle cx="115" cy="135" r="52" fill="none" stroke="#3a6ea5" stroke-width="2"/>
  <circle cx="165" cy="135" r="52" fill="none" stroke="#3a6ea5" stroke-width="2"/>
  <text x="83"  y="140" text-anchor="middle" font-size="16" fill="#444">x₁</text>
  <text x="197" y="140" text-anchor="middle" font-size="16" fill="#444">x₂</text>
  <text x="140" y="232" text-anchor="middle" font-size="15" fill="#555">両方 1 のときだけ（重なり）</text>

  <!-- ===================== OR (top-right) ===================== -->
  <text x="420" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">OR</text>
  <rect x="320" y="60" width="200" height="150" rx="10" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <!-- shaded: union (solid fill, no opacity so overlap is uniform) -->
  <circle cx="395" cy="135" r="52" fill="#7fb3df"/>
  <circle cx="445" cy="135" r="52" fill="#7fb3df"/>
  <circle cx="395" cy="135" r="52" fill="none" stroke="#3a6ea5" stroke-width="2"/>
  <circle cx="445" cy="135" r="52" fill="none" stroke="#3a6ea5" stroke-width="2"/>
  <text x="363" y="140" text-anchor="middle" font-size="16" fill="#444">x₁</text>
  <text x="477" y="140" text-anchor="middle" font-size="16" fill="#444">x₂</text>
  <text x="420" y="232" text-anchor="middle" font-size="15" fill="#555">どちらかが 1（和集合）</text>

  <!-- ===================== NAND (bottom-left) ===================== -->
  <text x="140" y="300" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">NAND</text>
  <rect x="40" y="320" width="200" height="150" rx="10" fill="#7fb3df" stroke="#cccccc" stroke-width="1.5"/>
  <!-- erase the intersection back to white -->
  <circle cx="165" cy="395" r="52" fill="#ffffff" clip-path="url(#clipNAND)"/>
  <circle cx="115" cy="395" r="52" fill="none" stroke="#3a6ea5" stroke-width="2"/>
  <circle cx="165" cy="395" r="52" fill="none" stroke="#3a6ea5" stroke-width="2"/>
  <text x="83"  y="400" text-anchor="middle" font-size="16" fill="#444">x₁</text>
  <text x="197" y="400" text-anchor="middle" font-size="16" fill="#444">x₂</text>
  <text x="140" y="492" text-anchor="middle" font-size="15" fill="#555">重なり以外すべて（AND の否定）</text>

  <!-- ===================== XOR (bottom-right) ===================== -->
  <text x="420" y="300" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">XOR</text>
  <rect x="320" y="320" width="200" height="150" rx="10" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <!-- shaded: symmetric difference via even-odd fill rule -->
  <path d="M343,395 a52,52 0 1,0 104,0 a52,52 0 1,0 -104,0 Z M393,395 a52,52 0 1,0 104,0 a52,52 0 1,0 -104,0 Z"
        fill="#7fb3df" fill-rule="evenodd"/>
  <circle cx="395" cy="395" r="52" fill="none" stroke="#3a6ea5" stroke-width="2"/>
  <circle cx="445" cy="395" r="52" fill="none" stroke="#3a6ea5" stroke-width="2"/>
  <text x="363" y="400" text-anchor="middle" font-size="16" fill="#444">x₁</text>
  <text x="477" y="400" text-anchor="middle" font-size="16" fill="#444">x₂</text>
  <text x="420" y="492" text-anchor="middle" font-size="15" fill="#555">重なりを除いた部分（片方だけ 1）</text>
</svg>
